<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mira — diary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --cream:#F7F2EA; --card:#FFFEFA; --ink:#2B241F; --ink-soft:#6E6356; --line:#E5DCCC;
    --terracotta:#BE6E4D; --terracotta-soft:#E7C3B2; --sage:#7C8F6E; --sage-soft:#D8E0CE; --gold:#B9902E;
    --shadow:0 1px 2px rgba(43,36,31,.04), 0 6px 20px rgba(43,36,31,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; padding:40px 20px 80px;}
  .wrap{max-width:560px; margin:0 auto;}
  .top-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .wordmark{font-family:'Source Serif 4',serif; font-style:italic; font-size:26px; margin:0;}
  .signout{font-size:11.5px; color:var(--ink-soft); background:none; border:none; cursor:pointer; text-decoration:underline;}
  .tagline{color:var(--ink-soft); font-size:13px; margin:0 0 28px;}

  .mode-toggle{display:flex; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:3px; margin-bottom:10px;}
  .mode-toggle button{flex:1; border:none; background:transparent; padding:8px 0; border-radius:8px; font-size:12px; color:var(--ink-soft); cursor:pointer;}
  .mode-toggle button.active{background:var(--ink); color:var(--cream);}

  .search-wrap{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:6px 6px 6px 18px;
               display:flex; align-items:center; gap:8px; box-shadow:var(--shadow);}
  .search-wrap input{flex:1; border:none; outline:none; background:transparent; font-family:'Source Serif 4',serif; font-size:16px; padding:14px 0;}
  .search-wrap input::placeholder{color:#B6AC9A; font-style:italic;}
  .search-wrap button{border:none; background:var(--ink); color:var(--cream); width:38px; height:38px; border-radius:10px; cursor:pointer;}
  .search-wrap button:disabled{opacity:.4;}

  .quick-grid{display:none; grid-template-columns:1fr 1fr; gap:8px;}
  .quick-grid.show{display:grid;}
  .quick-btn{border:1px solid var(--line); background:var(--card); border-radius:11px; padding:13px; font-size:13px; color:var(--ink); cursor:pointer; text-align:left;}
  .quick-btn:active{background:var(--sage-soft); border-color:var(--sage);}

  .response-card{margin-top:16px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:var(--shadow); display:none;}
  .response-card.show{display:block;}
  .response-card.concern{background:#F2DEDE; border-color:#A94442;}
  .response-kicker{font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-soft); display:block; margin-bottom:6px;}
  .response-kicker.log{color:var(--gold);}
  .response-kicker.concern{color:#A94442;}
  .response-text{font-size:14px; line-height:1.55;}

  .links-row{display:flex; gap:10px; margin:18px 2px 0;}
  .link-pill{flex:1; text-align:center; font-size:11.5px; color:var(--ink); background:var(--card); border:1px solid var(--line);
             border-radius:11px; padding:10px; text-decoration:none; cursor:pointer;}
  .link-pill:hover{border-color:var(--terracotta); color:var(--terracotta);}

  .stats-strip{margin:18px 2px 0; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); display:flex; flex-wrap:wrap; gap:14px;}
  .stats-strip span b{color:var(--ink); font-weight:500;}

  .cal-card{margin-top:20px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; box-shadow:var(--shadow);}
  .cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .cal-month{font-family:'Source Serif 4',serif; font-size:17px;}
  .cal-nav button{border:1px solid var(--line); background:transparent; width:28px; height:28px; border-radius:8px; cursor:pointer; color:var(--ink-soft);}
  .weekdays{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px;}
  .weekdays div{text-align:center; font-size:10px; color:var(--ink-soft); font-family:'JetBrains Mono',monospace;}
  .days{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
  .day{aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:9px; cursor:pointer; position:relative; font-size:13px; border:1.5px solid transparent;}
  .day.empty{cursor:default;}
  .day.today{border-color:var(--ink);}
  .day.period{background:var(--terracotta); color:#fff;}
  .day.period-predicted{background:var(--terracotta-soft);}
  .day.fertile{box-shadow:inset 0 0 0 1.5px var(--sage);}
  .day.ovulation{background:var(--sage); color:#fff;}
  .day .dot{width:4px; height:4px; border-radius:50%; background:var(--gold); position:absolute; bottom:5px;}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:11px; color:var(--ink-soft);}
  .legend-item{display:flex; align-items:center; gap:6px;}
  .swatch{width:9px; height:9px; border-radius:3px;}
  .empty-state{text-align:center; padding:40px 0; color:var(--ink-soft); font-size:13.5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <p class="wordmark">mira</p>
    <button class="signout" id="signoutBtn">sign out</button>
  </div>
  <p class="tagline">log it plainly, ask it plainly</p>

  <div class="mode-toggle" id="modeToggle">
    <button class="active" data-mode="type">type</button>
    <button data-mode="tap">tap</button>
  </div>

  <div class="search-wrap" id="writeRow">
    <input id="searchInput" type="text" placeholder="ask a question, or log something…" autocomplete="off">
    <button id="searchBtn">→</button>
  </div>

  <div class="quick-grid" id="quickGrid">
    <button class="quick-btn" data-cat="period_start">Period started</button>
    <button class="quick-btn" data-cat="period_end">Period ended</button>
    <button class="quick-btn" data-cat="sex">Had sex</button>
    <button class="quick-btn" data-cat="symptom">Cramps</button>
    <button class="quick-btn" data-cat="spotting">Spotting</button>
    <button class="quick-btn" data-cat="mood">Low mood</button>
  </div>

  <div class="response-card" id="responseCard">
    <span class="response-kicker" id="responseKicker">ANSWER</span>
    <div class="response-text" id="responseText"></div>
  </div>

  <div class="links-row">
    <a class="link-pill" id="calendarLink" href="#" target="_blank">📅 Add to phone calendar</a>
    <a class="link-pill" id="summaryLink" href="/summary.html" target="_blank">📋 Clinic summary</a>
  </div>

  <div class="stats-strip" id="statsStrip"></div>

  <div class="cal-card">
    <div class="cal-head">
      <div class="cal-month" id="calMonth"></div>
      <div class="cal-nav"><button id="prevMonth">‹</button> <button id="nextMonth">›</button></div>
    </div>
    <div class="weekdays"><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div></div>
    <div class="days" id="daysGrid"></div>
    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:var(--terracotta)"></div>period</div>
      <div class="legend-item"><div class="swatch" style="background:var(--terracotta-soft)"></div>predicted</div>
      <div class="legend-item"><div class="swatch" style="box-shadow:inset 0 0 0 1.5px var(--sage)"></div>fertile</div>
      <div class="legend-item"><div class="swatch" style="background:var(--sage)"></div>ovulation</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://fwkseonynvhtvlyiufzz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fsQ79Lz-UHTf0SXsaWP05g_FzSPlfty';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const D = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const iso = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const sameDay = (a,b) => iso(a)===iso(b);

let session = null, entries = [], stats = null, viewMonth = new Date();

function computeStats(periods){
  if(periods.length===0) return null;
  const sorted=[...periods].sort((a,b)=> a.start_date<b.start_date?1:-1);
  const cycles=[]; for(let i=0;i<sorted.length-1;i++){ const g=(D(sorted[i].start_date)-D(sorted[i+1].start_date))/86400000; if(g>0&&g<90) cycles.push(g); }
  const durations=sorted.map(p=> p.end_date ? (D(p.end_date)-D(p.start_date))/86400000+1 : null).filter(d=>d&&d>0&&d<15);
  const avgCycle = cycles.length? cycles.reduce((a,b)=>a+b,0)/cycles.length : 28;
  const avgDuration = durations.length? durations.reduce((a,b)=>a+b,0)/durations.length : 5;
  const lastStart = D(sorted[0].start_date);
  const nextStart = addDays(lastStart, Math.round(avgCycle));
  const nextEnd = addDays(nextStart, Math.round(avgDuration)-1);
  const ovulation = addDays(nextStart, -14);
  return { avgCycle, avgDuration, nextStart, nextEnd, ovulation, fertileStart: addDays(ovulation,-5), fertileEnd: addDays(ovulation,1) };
}

async function loadEntries(){
  const { data } = await supabase.from('cycle_entries').select('entry_date, category').order('entry_date', {ascending:false});
  entries = data || [];
  const starts = entries.filter(e=>e.category==='period_start');
  const periods = starts.map(s=>{
    const end = entries.find(e=>e.category==='period_end' && e.entry_date>=s.entry_date);
    return { start_date: s.entry_date, end_date: end? end.entry_date : null };
  });
  stats = computeStats(periods);
}

function renderStats(){
  const el = document.getElementById('statsStrip');
  if(!stats){ el.innerHTML = ''; return; }
  el.innerHTML = `<span>avg cycle <b>${stats.avgCycle.toFixed(1)}d</b></span>
    <span>avg period <b>${stats.avgDuration.toFixed(1)}d</b></span>
    <span>next period <b>${stats.nextStart.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</b></span>`;
}

function renderCalendar(){
  document.getElementById('calMonth').textContent = viewMonth.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const grid = document.getElementById('daysGrid'); grid.innerHTML='';
  const year=viewMonth.getFullYear(), month=viewMonth.getMonth();
  let offset = new Date(year,month,1).getDay()-1; if(offset<0) offset=6;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = new Date();
  for(let i=0;i<offset;i++){ const e=document.createElement('div'); e.className='day empty'; grid.appendChild(e); }
  for(let d=1; d<=daysInMonth; d++){
    const date = new Date(year,month,d);
    const cell = document.createElement('div'); cell.className='day';
    const isPeriod = entries.some(en=>en.category==='period_start' && sameDay(D(en.entry_date),date)) ||
                      entries.some(en=>en.category==='period_end' && sameDay(D(en.entry_date),date));
    const isPred = stats && date>=stats.nextStart && date<=stats.nextEnd;
    const isFertile = stats && date>=stats.fertileStart && date<=stats.fertileEnd;
    const isOv = stats && sameDay(date, stats.ovulation);
    const hasEntry = entries.some(en=>sameDay(D(en.entry_date),date));
    if(isPeriod) cell.classList.add('period');
    else if(isOv) cell.classList.add('ovulation');
    else if(isPred) cell.classList.add('period-predicted');
    if(isFertile && !isPeriod) cell.classList.add('fertile');
    if(sameDay(date,today)) cell.classList.add('today');
    cell.innerHTML = `${d}` + (hasEntry ? '<span class="dot"></span>' : '');
    grid.appendChild(cell);
  }
}

async function askMira(text){
  const context = {
    todayISO: iso(new Date()),
    avgCycleDays: stats ? Math.round(stats.avgCycle*10)/10 : null,
    avgDurationDays: stats ? Math.round(stats.avgDuration*10)/10 : null,
    predictedNextPeriodStart: stats ? iso(stats.nextStart) : null,
    predictedOvulation: stats ? iso(stats.ovulation) : null,
    fertileWindowStart: stats ? iso(stats.fertileStart) : null,
    fertileWindowEnd: stats ? iso(stats.fertileEnd) : null
  };
  const res = await fetch('/api/ask', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text, context })
  });
  return res.json();
}

async function persistEntries(items){
  const rows = items.map(e => ({ user_id: session.user.id, entry_date: e.date, category: e.category }));
  await supabase.from('cycle_entries').insert(rows);
  await loadEntries(); renderStats(); renderCalendar();
}

async function handleSubmit(){
  const input = document.getElementById('searchInput');
  const text = input.value.trim(); if(!text) return;
  const btn = document.getElementById('searchBtn'); btn.disabled = true;
  const card = document.getElementById('responseCard'), kicker = document.getElementById('responseKicker'), body = document.getElementById('responseText');
  card.className = 'response-card show'; kicker.textContent='…'; body.textContent='thinking';

  try {
    const parsed = await askMira(text);
    if(parsed.type === 'log'){
      await persistEntries(parsed.entries || []);
      kicker.textContent = (parsed.entries||[]).length>1 ? `LOGGED × ${parsed.entries.length}` : 'LOGGED';
      kicker.className='response-kicker log';
      body.textContent = 'Saved to your diary.';
    } else if(parsed.type === 'concern'){
      if(parsed.entries) await persistEntries(parsed.entries);
      card.classList.add('concern');
      kicker.textContent='TAKE CARE'; kicker.className='response-kicker concern';
      body.textContent = parsed.answer;
    } else {
      kicker.textContent = parsed.type === 'navigate' ? 'HERE' : 'ANSWER';
      kicker.className='response-kicker';
      body.textContent = parsed.answer;
    }
  } catch(e){
    kicker.textContent='ERROR'; body.textContent='Something went wrong — try again.';
  }
  input.value=''; btn.disabled=false;
}

function wireModeToggle(){
  document.querySelectorAll('#modeToggle button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#modeToggle button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const mode = btn.dataset.mode;
      document.getElementById('writeRow').style.display = mode==='type' ? '' : 'none';
      document.getElementById('quickGrid').classList.toggle('show', mode==='tap');
    });
  });
}

async function init(){
  const { data: { session: s } } = await supabase.auth.getSession();
  if(!s){ window.location.href = '/index.html'; return; }
  session = s;

  const { data: profile } = await supabase.from('profiles').select('calendar_token').single();
  if(profile) document.getElementById('calendarLink').href = `webcal://${window.location.host}/api/calendar?token=${profile.calendar_token}`;

  await loadEntries(); renderStats(); renderCalendar(); wireModeToggle();

  document.getElementById('searchBtn').addEventListener('click', handleSubmit);
  document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleSubmit(); });
  document.querySelectorAll('.quick-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> persistEntries([{ date: iso(new Date()), category: btn.dataset.cat }]));
  });
  document.getElementById('prevMonth').addEventListener('click', ()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); renderCalendar(); });
  document.getElementById('nextMonth').addEventListener('click', ()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1); renderCalendar(); });
  document.getElementById('signoutBtn').addEventListener('click', async ()=>{ await supabase.auth.signOut(); window.location.href='/index.html'; });
}
init();
</script>
</body>
</html>
