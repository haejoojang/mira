<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mira — a quiet diary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');
  :root{ --cream:#F7F2EA; --card:#FFFEFA; --ink:#2B241F; --ink-soft:#6E6356; --line:#E5DCCC; }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
       background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; padding:24px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:20px; padding:56px 40px;
        max-width:400px; width:100%; text-align:center; box-shadow:0 6px 30px rgba(43,36,31,.06);}
  .wordmark{font-family:'Source Serif 4',serif; font-style:italic; font-size:34px; margin:0 0 6px;}
  .tagline{color:var(--ink-soft); font-size:13.5px; margin-bottom:36px; line-height:1.5;}
  .row{display:flex; border:1.5px solid var(--ink); border-radius:50px; overflow:hidden;}
  input{flex:1; border:none; outline:none; padding:14px 18px; font-size:14.5px; background:transparent; color:var(--ink);}
  button{border:none; background:var(--ink); color:var(--cream); padding:0 20px; font-size:17px; cursor:pointer;}
  button:disabled{opacity:.5; cursor:default;}
  .note{margin-top:16px; font-size:11.5px; color:var(--ink-soft); line-height:1.5;}
  .status{margin-top:18px; font-size:13.5px; display:none;}
  .status.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <p class="wordmark">mira</p>
  <p class="tagline">A quiet diary for your body.<br>Nothing shared. Nothing sold.</p>
  <div class="row">
    <input id="email" type="email" placeholder="your email address" autocomplete="email">
    <button id="sendBtn">→</button>
  </div>
  <p class="note">We'll send a secure sign-in link — no password needed.<br>Your diary entries stay in your own inbox, not ours.</p>
  <p class="status" id="status"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // Fill these in after creating your Supabase project (README step 1).
  const SUPABASE_URL = 'https://fwkseonynvhtvlyiufzz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_fsQ79Lz-UHTf0SXsaWP05g_FzSPlfty';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const emailInput = document.getElementById('email');
  const btn = document.getElementById('sendBtn');
  const status = document.getElementById('status');

  async function sendLink(){
    const email = emailInput.value.trim();
    if(!email) return;
    btn.disabled = true;
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/diary.html' }
    });
    status.classList.add('show');
    status.textContent = error ? 'Something went wrong — try again.' : `Check ${email} for your sign-in link.`;
    btn.disabled = false;
  }
  btn.addEventListener('click', sendLink);
  emailInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendLink(); });
</script>
</body>
</html>
